<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div class="calculadora">
        <div class="pantalla" id="pantalla">0</div>
        
        <div class="botones">
            <button class="btn-clear">C</button>
            <button class="btn-operador">^</button>
            <button class="btn-operador">√</button>
            <button class="btn-operador">/</button>
            
            <button class="btn-cientifica">sin</button>
            <button class="btn-cientifica">cos</button>
            <button class="btn-cientifica">tan</button>
            <button class="btn-operador">*</button>
            
            <button class="btn-cientifica">log</button>
            <button class="btn-cientifica">x!</button>
            <button class="btn-cientifica">abs</button>
            <button class="btn-operador">-</button>
            
            <button class="btn-numero">7</button>
            <button class="btn-numero">8</button>
            <button class="btn-numero">9</button>
            <button class="btn-operador">+</button>
            
            <button class="btn-numero">4</button>
            <button class="btn-numero">5</button>
            <button class="btn-numero">6</button>
            <button class="btn-numero">.</button>
            
            <button class="btn-numero">1</button>
            <button class="btn-numero">2</button>
            <button class="btn-numero">3</button>
            <button class="btn-igual">=</button>
            
            <button class="btn-numero" style="grid-column: span 2;">0</button>
            <button class="btn-delete" style="grid-column: span 2;">⌫</button>
        </div>
    </div>
</body>
</html>
